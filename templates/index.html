{% extends "base.html" %}

{% block content %}
<form action="/" method="get" class="filter-bar">
    <div class="filter-item">
        <label>Asignatura</label>
        <select name="subject" onchange="this.form.submit()">
            <option value="">Todas</option>
            {% for s in subjects %}
            <option value="{{ s }}" {% if s==selected_subject %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="filter-item">
        <label>Curso</label>
        <select name="grade" onchange="this.form.submit()">
            <option value="">Todos</option>
            {% for g in grades %}
            <option value="{{ g }}" {% if g==selected_grade %}selected{% endif %}>{{ g }}</option>
            {% endfor %}
        </select>
    </div>

</form>

<div class="pdf-list">
    {% if not pdfs %}
    <div class="card" style="text-align: center; color: var(--text-muted);">
        <p>No se encontraron documentos con estos filtros.</p>
    </div>
    {% endif %}

    {% for pdf in pdfs %}
    <a href="/pdf/{{ pdf.id }}" class="card pdf-item clickable-card">
        <div class="pdf-item-info">
            <h3 class="pdf-title">{{ pdf.title }}</h3>
        </div>
        <div class="pdf-item-arrow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
